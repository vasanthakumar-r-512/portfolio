<body>

    <center style="margin-top: 80px;"> <h1 style="color: #38BDF8;">Contact Us</h1></center>
    <div class="ccon">
        <div class="cconup">
            <div class="cconup-left">
                <form class="form" action="">
                    <center style="margin-bottom: 20px;">Queries</center>
                    <div class="form-group">
                        <label for="name">Name: </label>
                        <input type="text" id="name" placeholder="eg:Elonmusk">
                    </div>
                    <div class="form-group">
                        <label for="num">phone No: </label>
                        <input type="number" id="num" placeholder="eg:9876543210">
                    </div>
                    <div class="form-group">
                        <label for="selc">service: </label>
                        <select name="" id="selc">
                            <option value="">select</option>
                            <option value="">Ecommerce</option>
                            <option value="">UI/UX</option>
                            <option value="">video editing</option>
                        </select><br>
                    </div>
                    <div class="form-group">
                        <label for="email">Email ID:</label>
                        <input type="text" id="email" placeholder="eg:example@gmail.com"><br>
                    </div>
                    <div class="form-group">
                        <label for="loc">location:</label>
                        <input id="loc" type="text" placeholder="eg:chennai"><br>
                    </div>
                    <center style="margin-top: 30px;"><input type="submit"></center>
                </form>
            </div>
            <div class="cconup-right">
                <div class="slider">

                    <div class="slides">

                        <img src="img/Screenshot 2026-03-02 154344.png">
                        <img src="img/ui.jpg">
                        <img src="img/videoediting.jpg">
                        <img src="img/Screenshot 2026-03-02 154344.png">

                    </div>
                </div>
            </div>
        </div>
        <div class="ccondown">
            <div class="icon">
                <div class="contact">

                    <p><i class="fa-solid fa-location-dot" style="color: rgb(157, 240, 227);"></i> Chennai, India</p>

                    <p><i class="fa-solid fa-phone" style="color: rgb(157, 240, 227);"></i></i> +91 9876543210</p>

                    <p><i class="fa-brands fa-instagram" style="color: rgb(157, 240, 227);"></i> @Vasanthakumar</p>

                    <p><i class="fa-solid fa-envelope" style="color: rgb(157, 240, 227);"></i> vasanthakumar@gmail.com
                    </p>

                </div>
            </div>
            <div class="map">
